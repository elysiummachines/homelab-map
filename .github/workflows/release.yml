name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: zip -r homelab-map-${{ github.ref_name }}.zip dist/

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$(git describe --tags --abbrev=0)$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline | awk '{hash=$1; $1=""; printf "["hash"](${{ github.server_url }}/${{ github.repository }}/commit/"hash")"substr($0,2)"\n"}')
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline | awk '{hash=$1; $1=""; printf "["hash"](${{ github.server_url }}/${{ github.repository }}/commit/"hash")"substr($0,2)"\n"}')
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Changelog" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: homelab-map-*.zip
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}